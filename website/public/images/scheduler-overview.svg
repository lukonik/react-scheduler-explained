<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">React Scheduler overview</title>
  <desc id="desc">A diagram showing React updates entering Scheduler, ready tasks stored in taskQueue, Scheduler running a time slice, yielding to browser work, and continuing later.</desc>
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569" />
    </marker>
    <filter id="soft-shadow" x="-12%" y="-16%" width="124%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.1" />
    </filter>
    <style>
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; filter: url(#soft-shadow); }
      .soft { fill: #f8fafc; stroke: #dbe3ee; stroke-width: 2; }
      .title { fill: #0f172a; font: 700 28px Inter, ui-sans-serif, system-ui, sans-serif; }
      .label { fill: #334155; font: 600 18px Inter, ui-sans-serif, system-ui, sans-serif; }
      .small { fill: #64748b; font: 500 14px Inter, ui-sans-serif, system-ui, sans-serif; }
      .tiny { fill: #64748b; font: 500 13px Inter, ui-sans-serif, system-ui, sans-serif; }
      .task-title { fill: #0f172a; font: 700 15px Inter, ui-sans-serif, system-ui, sans-serif; }
      .task-meta { fill: #475569; font: 500 12px Inter, ui-sans-serif, system-ui, sans-serif; }
      .arrow-blue { fill: none; stroke: #2563eb; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-blue); }
      .arrow-slate { fill: none; stroke: #475569; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow-slate); }
      .dash { stroke-dasharray: 9 9; }
    </style>
  </defs>

  <rect width="1100" height="620" rx="28" fill="#f1f5f9" />
  <circle cx="80" cy="80" r="58" fill="#dbeafe" opacity="0.65" />
  <circle cx="1030" cy="530" r="82" fill="#dcfce7" opacity="0.55" />

  <text x="72" y="72" class="title">Scheduler keeps React work moving without owning the whole thread</text>
  <text x="74" y="106" class="small">It runs ready tasks in small slices, then gives the browser a chance to handle input, layout, and paint.</text>

  <rect x="70" y="170" width="220" height="160" rx="18" class="panel" />
  <text x="100" y="215" class="label">React update</text>
  <text x="100" y="246" class="small">A render is scheduled</text>
  <text x="100" y="272" class="small">with a priority level</text>
  <rect x="100" y="294" width="130" height="12" rx="6" fill="#2563eb" opacity="0.18" />

  <path d="M 300 250 C 345 250, 360 250, 400 250" class="arrow-blue" />

  <rect x="410" y="138" width="260" height="282" rx="20" class="panel" />
  <text x="450" y="188" class="label">taskQueue</text>
  <text x="450" y="215" class="small">Ready tasks ordered by expiration</text>

  <rect x="455" y="245" width="170" height="52" rx="12" fill="#dbeafe" stroke="#93c5fd" stroke-width="2" />
  <text x="478" y="267" class="task-title">Task A</text>
  <text x="478" y="286" class="task-meta">urgent input update</text>

  <rect x="455" y="309" width="170" height="52" rx="12" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="2" />
  <text x="478" y="331" class="task-title">Task B</text>
  <text x="478" y="350" class="task-meta">normal render work</text>

  <rect x="455" y="373" width="170" height="52" rx="12" fill="#eef2ff" stroke="#c7d2fe" stroke-width="2" />
  <text x="478" y="395" class="task-title">Task C</text>
  <text x="478" y="414" class="task-meta">lower priority work</text>

  <path d="M 670 280 C 705 280, 715 280, 750 280" class="arrow-blue" />

  <rect x="760" y="165" width="260" height="205" rx="20" class="panel" />
  <text x="800" y="214" class="label">Scheduler slice</text>
  <text x="800" y="244" class="small">Pick the highest priority</text>
  <text x="800" y="269" class="small">ready task, run some work,</text>
  <text x="800" y="294" class="small">then check the time budget.</text>
  <rect x="800" y="320" width="160" height="12" rx="6" fill="#2563eb" opacity="0.22" />
  <rect x="800" y="320" width="104" height="12" rx="6" fill="#2563eb" opacity="0.9" />

  <path d="M 895 372 C 895 425, 835 442, 768 442" class="arrow-slate dash" />

  <rect x="475" y="455" width="360" height="100" rx="18" class="soft" />
  <text x="515" y="493" class="label">Yield to browser work</text>
  <text x="515" y="522" class="small">Input events, style, layout, paint</text>

  <path d="M 482 498 C 355 498, 312 418, 442 404" class="arrow-slate dash" />
  <text x="268" y="454" class="tiny">continue later if work remains</text>

  <rect x="72" y="392" width="250" height="116" rx="18" fill="#fff7ed" stroke="#fed7aa" stroke-width="2" />
  <text x="104" y="434" class="label">Main thread stays shared</text>
  <text x="104" y="463" class="small">Scheduler coordinates work,</text>
  <text x="104" y="488" class="small">but JavaScript still runs one</text>
  <text x="104" y="513" class="small">piece at a time.</text>
</svg>
